name: Build and Publish tgconverter Image

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'converter-api/**'
      - '.github/workflows/converter-api-image.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Compute image name
        id: image
        run: |
          OWNER_LOWER=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          echo "name=ghcr.io/${OWNER_LOWER}/tgconverter" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: converter-api/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:v${{ github.run_number }}
            ${{ steps.image.outputs.name }}:latest
          provenance: false
